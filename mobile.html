<script>
    let firebaseConfig = null;
    let ROOT = "";

    let db, auth, passwordKey = "";
    let patientsMap = {};
    let roomsMap = [];
    let rulesMap = {};
    let currentAppointments = [];
    let selectedSlot = null;
    let pendingDeleteId = null;
    let currentDateStr = "";
    let selectedRoomId = null;
    let selectedPatientId = null;
    let noteTimeout = null;

    function decrypt(encrypted) {
        if (!encrypted) return "";
        if (typeof encrypted === 'string' && !encrypted.startsWith('U2FsdGVk')) return encrypted;
        try {
            const bytes = CryptoJS.AES.decrypt(encrypted, passwordKey);
            return bytes.toString(CryptoJS.enc.Utf8) || encrypted;
        } catch { return "⚠️ err"; }
    }
    function encrypt(text) {
        if (!text) return text;
        return CryptoJS.AES.encrypt(text, passwordKey).toString();
    }
   function decodeHTML(str) {
    if (!str) return '';
    const txt = document.createElement('textarea');
    txt.innerHTML = str;
    const decoded = txt.value;
    // Strippa eventuali tag HTML rimasti
    const div = document.createElement('div');
    div.innerHTML = decoded;
    return div.textContent || div.innerText || '';
}

    function matchesMonthlyOccurrence(date, weekdays, occurrences) {
        const wd = date.getDay() === 0 ? 7 : date.getDay();
        if (!weekdays.includes(wd)) return false;
        const year = date.getFullYear(), month = date.getMonth(), day = date.getDate();
        let count = 0;
        for (let d = 1; d <= day; d++) {
            const test = new Date(year, month, d);
            const twd = test.getDay() === 0 ? 7 : test.getDay();
            if (twd === wd) count++;
        }
        if (occurrences.includes(-1)) {
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let d = day + 1; d <= daysInMonth; d++) {
                const test = new Date(year, month, d);
                const twd = test.getDay() === 0 ? 7 : test.getDay();
                if (twd === wd) return false;
            }
            return true;
        }
        return occurrences.includes(count);
    }

    function matchesBiweekly(date, weekdays, anchorDate) {
        const wd = date.getDay() === 0 ? 7 : date.getDay();
        if (!weekdays.includes(wd)) return false;
        const anchor = new Date(anchorDate); anchor.setHours(0,0,0,0);
        const target = new Date(date); target.setHours(0,0,0,0);
        const anchorDay = anchor.getDay() === 0 ? 7 : anchor.getDay();
        const anchorMonday = new Date(anchor);
        anchorMonday.setDate(anchor.getDate() - (anchorDay - 1));
        const targetDay = target.getDay() === 0 ? 7 : target.getDay();
        const targetMonday = new Date(target);
        targetMonday.setDate(target.getDate() - (targetDay - 1));
        const diffWeeks = Math.round((targetMonday - anchorMonday) / (7 * 86400000));
        return (diffWeeks % 2) === 0;
    }

    function findRegolaPer(catId, date) {
        const iso = date.toLocaleDateString('sv-SE');
        const wd = date.getDay() === 0 ? 7 : date.getDay();
        let best = null, bestP = -1, bestDate = null;
        for (const [id, r] of Object.entries(rulesMap)) {
            if (String(r.catId) !== String(catId)) continue;
            if (r.validaDa && iso < r.validaDa) continue;
            if (r.validaA && iso > r.validaA) continue;
            let match = false, p = 0;
            if (r.freq === 'once' && r.dataSpecifica === iso) { match = true; p = 3; }
            if (r.freq === 'monthly_specific' && r.monthlyWeekdays && r.monthlyOccurrences) {
                match = matchesMonthlyOccurrence(date, r.monthlyWeekdays, r.monthlyOccurrences); p = 2;
            }
            if (r.freq === 'monthly' && r.date && r.date.includes(iso)) { match = true; p = 2; }
            if (r.freq === 'weekly' && r.giorni && r.giorni.includes(wd)) { match = true; p = 1; }
            if (r.freq === 'biweekly' && r.biweeklyWeekdays && r.biweeklyAnchor) {
                match = matchesBiweekly(date, r.biweeklyWeekdays, r.biweeklyAnchor); p = 1.5;
            }
            if (match) {
                if (p > bestP) { bestP = p; best = r; bestDate = new Date(r.createdAt || 0); }
                else if (p === bestP) {
                    const rDate = new Date(r.createdAt || 0);
                    if (rDate > bestDate) { best = r; bestDate = rDate; }
                }
            }
        }
        return best;
    }

    function sortSlots(slots) {
        return slots.sort((a, b) => {
            if (a.ora && b.ora) {
                const getStart = (ora) => {
                    const m = ora.match(/^(\d{2}):(\d{2})/);
                    return m ? parseInt(m[1])*60 + parseInt(m[2]) : 0;
                };
                return getStart(a.ora) - getStart(b.ora);
            }
            if (!a.ora && !b.ora) return 0;
            if (!a.ora) return 1;
            return -1;
        });
    }

    function getSlotsForRoom(catId, date) {
        const rule = findRegolaPer(catId, date);
        if (rule && rule.slots && rule.slots.length) {
            return sortSlots([...rule.slots]);
        }
        return Array.from({ length: 8 }, (_, i) => ({
            tipo: 'VISITA', label: '', ora: null, slotNum: i+1, fasciaOraria: false
        }));
    }

    function openPasswordModal() {
        document.getElementById('passwordInput').value = '';
        document.getElementById('modalPassword').classList.add('open');
    }

    function submitPassword() {
        passwordKey = document.getElementById('passwordInput').value;
        if (!passwordKey) { alert("Inserisci password"); return; }
        closeModal('modalPassword');
        initApp();
    }

    function autoLogin() {
        const pw = sessionStorage.getItem('app_password') || localStorage.getItem('app_password');
        if (pw) {
            passwordKey = pw;
            initApp();
        } else {
            window.location.href = '../index.html';
        }
    }

    function initApp() {
        const statusDot = document.getElementById('statusDot');
        statusDot.className = 'status-dot yellow';
        try {
            firebaseConfig = window._firebaseConfig;
            ROOT = window._ROOT || ROOT;
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database(); auth = firebase.auth();
            auth.signInAnonymously()
                .then(() => {
                    const basePath = ROOT ? '/' + ROOT : '';
                    return Promise.all([
                        db.ref(basePath + '/pazienti').once('value'),
                        db.ref(basePath + '/tblCategories').once('value'),
                        db.ref(basePath + '/RegoleAttive').once('value')
                    ]);
                })
                .then(([paz, cat, rule]) => {
                    patientsMap = paz.val() || {};
                    const cats = cat.val() || {};
                    roomsMap = Object.entries(cats).map(([id, c]) => ({ id, name: c.name || 'Senza nome', color: c.color || '#64748b' })).filter(r => r.name);
                    rulesMap = rule.val() || {};

                    const select = document.getElementById('roomSelect');
                    select.innerHTML = '<option value="">Seleziona stanza</option>';
                    roomsMap.forEach(r => {
                        const opt = document.createElement('option');
                        opt.value = r.id;
                        opt.textContent = r.name;
                        select.appendChild(opt);
                    });

                    document.getElementById('viewSection').style.display = 'flex';
                    statusDot.className = 'status-dot green';

                    const today = new Date().toLocaleDateString('sv-SE');
                    document.getElementById('datePicker').value = today;
                    document.getElementById('datePicker').addEventListener('change', onDateChange);

                    if (roomsMap.length > 0) {
                        selectedRoomId = roomsMap[0].id;
                        select.value = selectedRoomId;
                    }
                    onDateChange();
                })
                .catch(err => {
                    alert(err.message);
                    statusDot.className = 'status-dot red';
                });
        } catch (e) { alert(e.message); }
    }

    function onDateChange() {
        clearTimeout(noteTimeout);
        const newDate = document.getElementById('datePicker').value;
        if (!newDate) return;
        if (newDate === currentDateStr) return;
        currentDateStr = newDate;
        const basePath = ROOT ? '/' + ROOT : '';

        db.ref(basePath + '/GiroVisite')
            .orderByChild('data')
            .equalTo(currentDateStr)
            .once('value')
            .then(snap => {
                const raw = snap.val() || {};
                currentAppointments = Object.entries(raw).map(([id, a]) => ({ ...a, id }));
                renderRoom();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('slotList').innerHTML = `<div style="color:#b91c1c;">Errore caricamento</div>`;
            });

        db.ref(basePath + '/dailyNotes/' + currentDateStr)
            .once('value')
            .then(snap => {
                const encrypted = snap.val() || '';
                document.getElementById('dailyNoteInput').value = decodeHTML(decrypt(encrypted));
            })
            .catch(err => console.error(err));
    }

    function onRoomChange() {
        const select = document.getElementById('roomSelect');
        selectedRoomId = select.value;
        if (selectedRoomId) {
            renderRoom();
        } else {
            document.getElementById('slotList').innerHTML = '';
            document.getElementById('roomHeader').textContent = 'Seleziona una stanza';
        }
    }

    function renderRoom() {
        if (!selectedRoomId || !roomsMap.length || !currentDateStr) return;
        const room = roomsMap.find(r => String(r.id) === String(selectedRoomId));
        if (!room) return;
        document.getElementById('roomHeader').textContent = room.name;
        document.getElementById('roomHeader').style.background = room.color;
        const slots = getSlotsForRoom(room.id, new Date(currentDateStr + 'T12:00:00'));
        let html = '';
        slots.forEach((slot, idx) => {
            const rowNo = idx + 1;
            const oraInizio = slot.ora ? slot.ora.split(' - ')[0] || slot.ora : null;
            let appt = currentAppointments.find(a =>
                String(a.stanzaID) === String(room.id) &&
                (String(a.rowNo) === String(rowNo) || (a.oraInizio && oraInizio && a.oraInizio.trim() === oraInizio.trim()))
            );
            const isPausaBloccato = appt && (appt.pazienteID === 'PAUSA' || appt.pazienteID === 'BLOCCATO');

            if (appt && !isPausaBloccato) {
                const p = patientsMap[appt.pazienteID];
                let nome = 'ID sconosciuto', badge = '';
                if (p) {
                    const n = decrypt(p.firstName_enc || p.firstName || p.f || '');
                    const c = decrypt(p.lastName_enc || p.lastName || p.l || '');
                    nome = `${c} ${n}`.toUpperCase();
                    if (p.firstName && !String(p.firstName).startsWith('U2FsdGVk')) badge = '<span class="badge-clear">CHIARO</span>';
                } else nome = `ID ${appt.pazienteID}`;
                html += `<div class="slot-item occupied" onclick="openEditModal('${appt.id}')">`;
                html += `<div class="slot-time">${slot.ora || `Slot ${rowNo}`}</div>`;
                html += `<div class="slot-patient">${nome} ${badge} <span class="delete-icon" onclick="event.stopPropagation(); openDeleteModal('${appt.id}')">🗑️</span></div>`;
                if (appt.pazienteNote) html += `<div class="slot-note">📝 ${appt.pazienteNote}</div>`;
                html += `</div>`;
            } else if (isPausaBloccato) {
                html += `<div class="slot-item slot-${appt.pazienteID.toLowerCase()}">`;
                html += `<div class="slot-time">${slot.ora || `Slot ${rowNo}`}</div>`;
                html += `<div>${appt.pazienteID === 'PAUSA' ? '☕' : '🚫'} ${appt.pazienteNome || appt.pazienteID}</div>`;
                html += `</div>`;
            } else {
                html += `<div class="slot-item empty-slot" onclick="openAddModal('${room.id}', ${rowNo}, '${slot.ora ? slot.ora.replace(/'/g, "\\'") : ''}')">`;
                html += `<div class="slot-time">${slot.ora || `Slot ${rowNo}`}</div>`;
                html += `<div style="color:#94a3b8;">🟢 vuoto</div>`;
                html += `</div>`;
            }
        });
        document.getElementById('slotList').innerHTML = html;
    }

    function openAddModal(roomId, rowNo, ora) {
        selectedSlot = { roomId, rowNo, ora };
        const roomName = roomsMap.find(r=>String(r.id)===String(roomId))?.name || roomId;
        document.getElementById('slotInfo').innerHTML = `${roomName} - Slot ${rowNo} ${ora ? 'alle '+ora : ''}`;
        document.getElementById('searchPatient').value = '';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('appointmentNote').value = '';
        document.getElementById('newL').value = ''; document.getElementById('newF').value = '';
        document.getElementById('newDob').value = ''; document.getElementById('newPhone').value = '';
        selectedPatientId = null;
        document.getElementById('saveSelectedPatientBtn').disabled = true;
        document.getElementById('modalAppointment').classList.add('open');
    }

    function searchPatients() {
        const q = document.getElementById('searchPatient').value.trim().toLowerCase();
        const resDiv = document.getElementById('searchResults');
        if (!q) { resDiv.innerHTML = ''; return; }
        const matches = Object.entries(patientsMap).map(([id, p]) => {
            const nome = decrypt(p.firstName_enc || p.firstName || p.f || '');
            const cogn = decrypt(p.lastName_enc || p.lastName || p.l || '');
            return { id, nome, cogn, full: (cogn + ' ' + nome).toLowerCase(), rev: (nome + ' ' + cogn).toLowerCase() };
        }).filter(p => p.full.includes(q) || p.rev.includes(q)).slice(0, 8);
        resDiv.innerHTML = '';
        matches.forEach(m => {
            const d = document.createElement('div');
            d.className = 'sr-item';
            d.innerHTML = `<strong>${m.cogn} ${m.nome}</strong>`;
            d.onclick = () => {
                document.querySelectorAll('#searchResults .sr-item').forEach(el => el.classList.remove('selected'));
                d.classList.add('selected');
                selectedPatientId = m.id;
                document.getElementById('saveSelectedPatientBtn').disabled = false;
            };
            resDiv.appendChild(d);
        });
        if (!matches.length) resDiv.innerHTML = '<div class="sr-item">Nessun risultato</div>';
    }

    function saveSelectedPatient() {
        if (!selectedSlot || !selectedPatientId) return;
        const note = document.getElementById('appointmentNote').value.trim();
        const basePath = ROOT ? '/' + ROOT : '';
        db.ref(basePath + '/GiroVisite').push({
            data: currentDateStr, stanzaID: selectedSlot.roomId, rowNo: selectedSlot.rowNo,
            oraInizio: selectedSlot.ora || null, pazienteID: selectedPatientId, pazienteNote: note || null
        }).then(() => {
            closeModal('modalAppointment');
            onDateChange();
        }).catch(err => alert(err.message));
    }

    function createAndBook() {
        if (!selectedSlot) return;
        const cogn = document.getElementById('newL').value.trim();
        const nom = document.getElementById('newF').value.trim();
        if (!cogn || !nom) { alert("Cognome e nome obbligatori"); return; }
        const dob = document.getElementById('newDob').value.trim();
        const phone = document.getElementById('newPhone').value.trim();
        const note = document.getElementById('appointmentNote').value.trim();
        const basePath = ROOT ? '/' + ROOT : '';
        const newId = String(Date.now());
        const patientData = {
            id: newId,
            lastName_enc: encrypt(cogn),
            firstName_enc: encrypt(nom),
            dataCreazione: new Date().toISOString()
        };
        if (dob) patientData.dob = dob;
        if (phone) patientData.telefono = phone;

        db.ref(basePath + '/pazienti/' + newId).set(patientData)
        .then(() => {
            patientsMap[newId] = patientData;
            return db.ref(basePath + '/GiroVisite').push({
                data: currentDateStr, stanzaID: selectedSlot.roomId, rowNo: selectedSlot.rowNo,
                oraInizio: selectedSlot.ora || null, pazienteID: newId, pazienteNote: note || null
            });
        }).then(() => {
            closeModal('modalAppointment');
            onDateChange();
        }).catch(err => alert(err.message));
    }

    let currentEditApptId = null;
    function openEditModal(apptId) {
        const appt = currentAppointments.find(a => a.id === apptId);
        if (!appt) return;
        currentEditApptId = apptId;
        const p = patientsMap[appt.pazienteID] || {};
        const room = roomsMap.find(r => String(r.id) === String(appt.stanzaID));
        document.getElementById('editInfo').innerHTML = `${room?.name || 'Stanza'} - Slot ${appt.rowNo} ${appt.oraInizio ? 'alle '+appt.oraInizio : ''}`;
        document.getElementById('editNote').value = appt.pazienteNote || '';
        const nome = decrypt(p.firstName_enc || p.firstName || p.f || '');
        const cogn = decrypt(p.lastName_enc || p.lastName || p.l || '');
        document.getElementById('editL').value = cogn;
        document.getElementById('editF').value = nome;
        document.getElementById('editDob').value = p.dob || '';
        document.getElementById('editPhone').value = p.telefono || '';
        document.getElementById('modalEditAppointment').classList.add('open');
    }

    function saveEditAppointment() {
        if (!currentEditApptId) return;
        const appt = currentAppointments.find(a => a.id === currentEditApptId);
        if (!appt) return;
        const basePath = ROOT ? '/' + ROOT : '';
        const newNote = document.getElementById('editNote').value.trim();
        const promises = [];

        if (newNote !== (appt.pazienteNote || '')) {
            promises.push(db.ref(basePath + '/GiroVisite/' + currentEditApptId).update({ pazienteNote: newNote || null }));
        }

        const p = patientsMap[appt.pazienteID];
        if (p) {
            const newL = document.getElementById('editL').value.trim();
            const newF = document.getElementById('editF').value.trim();
            const newDob = document.getElementById('editDob').value.trim();
            const newPhone = document.getElementById('editPhone').value.trim();
            const updates = {};
            if (newL && newL !== decrypt(p.lastName_enc || p.lastName || p.l || '')) updates.lastName_enc = encrypt(newL);
            if (newF && newF !== decrypt(p.firstName_enc || p.firstName || p.f || '')) updates.firstName_enc = encrypt(newF);
            if (newDob !== (p.dob || '')) updates.dob = newDob || null;
            if (newPhone !== (p.telefono || '')) updates.telefono = newPhone || null;
            if (Object.keys(updates).length > 0) {
                promises.push(db.ref(basePath + '/pazienti/' + appt.pazienteID).update(updates));
                Object.assign(p, updates);
            }
        }

        Promise.all(promises).then(() => {
            closeModal('modalEditAppointment');
            onDateChange();
        }).catch(err => alert(err.message));
    }

    function openDeleteModal(apptId) {
        pendingDeleteId = apptId;
        const appt = currentAppointments.find(a => a.id === apptId);
        if (!appt) return;
        const p = patientsMap[appt.pazienteID];
        let nome = "sconosciuto";
        if (p) {
            const n = decrypt(p.firstName_enc || p.firstName || p.f || '');
            const c = decrypt(p.lastName_enc || p.lastName || p.l || '');
            nome = `${c} ${n}`.toUpperCase();
        }
        document.getElementById('deleteInfo').innerText = `Eliminare ${nome}?`;
        document.getElementById('modalDeleteConfirm').classList.add('open');
    }

    function confirmDelete() {
        if (!pendingDeleteId) return;
        const basePath = ROOT ? '/' + ROOT : '';
        db.ref(basePath + '/GiroVisite/' + pendingDeleteId).remove()
            .then(() => {
                closeModal('modalDeleteConfirm');
                onDateChange();
            })
            .catch(err => alert(err.message));
    }

    document.getElementById('dailyNoteInput').addEventListener('input', function() {
        clearTimeout(noteTimeout);
        noteTimeout = setTimeout(() => {
            const content = this.value.trim();
            const basePath = ROOT ? '/' + ROOT : '';
            if (!content) {
                db.ref(basePath + '/dailyNotes/' + currentDateStr).remove();
            } else {
                db.ref(basePath + '/dailyNotes/' + currentDateStr).set(encrypt(content));
            }
        }, 800);
    });

    function openSearchModal() {
        document.getElementById('searchGlobalInput').value = '';
        document.getElementById('searchGlobalResults').innerHTML = '';
        document.getElementById('modalSearch').classList.add('open');
    }

    function searchGlobal() {
        const q = document.getElementById('searchGlobalInput').value.trim().toLowerCase();
        const resDiv = document.getElementById('searchGlobalResults');
        if (!q) { resDiv.innerHTML = ''; return; }

        const matches = Object.entries(patientsMap).map(([id, p]) => {
            const nome = decrypt(p.firstName_enc || p.firstName || p.f || '');
            const cogn = decrypt(p.lastName_enc || p.lastName || p.l || '');
            return { id, nome, cogn, full: (cogn + ' ' + nome).toLowerCase(), rev: (nome + ' ' + cogn).toLowerCase() };
        }).filter(p => p.full.includes(q) || p.rev.includes(q)).slice(0, 20);

        if (!matches.length) { resDiv.innerHTML = '<div class="sr-item">Nessun risultato</div>'; return; }

        resDiv.innerHTML = '<div style="padding:8px; color:#64748b; font-size:0.85rem;">Caricamento...</div>';

        const basePath = ROOT ? '/' + ROOT : '';
        db.ref(basePath + '/GiroVisite').once('value').then(snap => {
            const all = snap.val() || {};
            resDiv.innerHTML = '';
            matches.forEach(m => {
                const appts = Object.entries(all)
                    .filter(([, a]) => String(a.pazienteID) === String(m.id))
                    .sort((a, b) => (b[1].data || '').localeCompare(a[1].data || ''))
                    .slice(0, 5);

                const d = document.createElement('div');
                d.className = 'sr-item';
                let html = `<strong>${m.cogn} ${m.nome}</strong>`;
                if (appts.length) {
                    html += '<div style="font-size:0.85rem; color:#64748b; margin-top:4px;">';
                    appts.forEach(([, a]) => {
                        const room = roomsMap.find(r => String(r.id) === String(a.stanzaID));
                        html += `📅 ${a.data} — ${room?.name || a.stanzaID} slot ${a.rowNo}`;
                        if (a.oraInizio) html += ` (${a.oraInizio})`;
                        if (a.pazienteNote) html += ` — 📝 ${a.pazienteNote}`;
                        html += '<br>';
                    });
                    html += '</div>';
                } else {
                    html += '<div style="font-size:0.85rem; color:#94a3b8;">Nessun appuntamento</div>';
                }
                d.innerHTML = html;
                resDiv.appendChild(d);
            });
        });
    }

    function goToday() {
        document.getElementById('datePicker').value = new Date().toLocaleDateString('sv-SE');
        onDateChange();
    }

    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove('open');
        if (modalId === 'modalAppointment') selectedPatientId = null;
        if (modalId === 'modalEditAppointment') currentEditApptId = null;
        if (modalId === 'modalDeleteConfirm') pendingDeleteId = null;
    }

    window.openPasswordModal = openPasswordModal;
    window.submitPassword = submitPassword;
    window.onDateChange = onDateChange;
    window.onRoomChange = onRoomChange;
    window.goToday = goToday;
    window.openAddModal = openAddModal;
    window.closeModal = closeModal;
    window.searchPatients = searchPatients;
    window.saveSelectedPatient = saveSelectedPatient;
    window.createAndBook = createAndBook;
    window.openEditModal = openEditModal;
    window.saveEditAppointment = saveEditAppointment;
    window.openDeleteModal = openDeleteModal;
    window.confirmDelete = confirmDelete;
    window.openSearchModal = openSearchModal;
    window.searchGlobal = searchGlobal;

    window.addEventListener('configReady', () => {
        autoLogin();
    });
</script>
</body>
</html>
